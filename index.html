<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO & Meta -->
  <title>BitByte Technologies · Innovation in progress</title>
  <meta name="description" content="BitByte Technologies is cooking something better. Fine‑tuning the sculpture just for you!!! Reach out to us.">
  <meta name="keywords" content="BitByte, technology, under construction, innovation, IT solutions">
  <meta name="author" content="BitByte Technologies">
  <!-- Open Graph / social -->
  <meta property="og:title" content="BitByte Technologies">
  <meta property="og:description" content="We are cooking something better for you!!!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bitbytetech.org">
  <meta property="og:image" content="https://bitbytetech.org/og-image.jpg">
  <!-- Favicon (placeholders) -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='10' y='70' font-size='80' fill='%232d9eff'%3E0/1%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='10' y='70' font-size='80' fill='%232d9eff'%3E0/1%3C/text%3E%3C/svg%3E">
  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.7.2/css/all.css">
  <!-- Google Fonts with font-display swap -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---------- CSS VARIABLES (theming) ---------- */
    :root {
      --primary-light: #2d9eff;
      --primary-medium: #1e6eb5;
      --primary-dark: #0a4b78;
      --accent-warm: #ffaa33;
      --bg-white: #ffffff;
      --text-dark: #102a3c;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --border-glow: rgba(165, 210, 255, 0.5);
      --spacing-xs: 0.5rem;
      --spacing-sm: 0.8rem;
      --spacing-md: 1.2rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --font-base: 1rem;
      --font-scale: 1.25;
      --transition-default: all 0.2s ease;
      --shadow-card: 0 40px 60px -20px rgba(0, 65, 110, 0.3);
    }

    /* Dark mode variables (toggled by class) */
    body.dark-mode {
      --primary-light: #4da6ff;
      --primary-medium: #3d8cd9;
      --primary-dark: #b0d4ff;
      --accent-warm: #ffb347;
      --bg-white: #1a1f2a;
      --text-dark: #e0e9f0;
      --glass-bg: rgba(30, 35, 45, 0.85);
      --border-glow: rgba(70, 140, 210, 0.5);
      --shadow-card: 0 40px 60px -20px rgba(0, 0, 0, 0.5);
    }

    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-white);
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      overflow-x: hidden;
      position: relative;
      transition: background-color 0.3s, color 0.3s;
      scroll-behavior: smooth;
    }

    /* Animated gradient background (slow moving) */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 50%, rgba(45,158,255,0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(255,170,51,0.1) 0%, transparent 50%),
                  var(--bg-white);
      z-index: -1;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* custom cursor (disabled on touch devices) */
    @media (hover: hover) and (pointer: fine) {
      body:not(.dark-mode) .custom-cursor {
        display: flex;
      }
      * {
        cursor: none;
      }
    }
    .custom-cursor {
      position: fixed;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 9999;
      font-family: 'Courier New', monospace;
      font-weight: 800;
      font-size: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(90, 170, 255, 0.15);
      border-radius: 50%;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.6);
      color: var(--primary-medium);
      transform: translate(-50%, -50%);
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 0 15px rgba(0,160,255,0.3);
      animation: cursorFloat 2s infinite alternate;
    }
    @keyframes cursorFloat {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1.1); }
    }

    /* binary rain canvas with fallback */
    #binary-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.25;
      pointer-events: none;
    }
    .canvas-fallback {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(45,158,255,0.03) 0px, rgba(45,158,255,0.03) 20px, transparent 20px, transparent 40px);
      z-index: 0;
      display: none;
    }
    /* if canvas fails, show fallback */
    .no-canvas .canvas-fallback {
      display: block;
    }

    /* floating tech icons (parallax) - with bounce on hover */
    .parallax-icons {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .parallax-icon {
      position: absolute;
      font-size: 2.5rem;
      color: rgba(30, 120, 210, 0.1);
      transition: transform 0.03s linear, color 0.3s;
      pointer-events: auto;
    }
    .parallax-icon i {
      filter: drop-shadow(0 0 8px #8fcbff);
    }
    .parallax-icon:hover {
      color: var(--primary-light);
      animation: bounce 0.5s ease;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .icon1 { top: 15%; left: 8%; }
    .icon2 { top: 70%; left: 85%; }
    .icon3 { top: 80%; left: 12%; }
    .icon4 { top: 25%; left: 88%; }
    .icon5 { top: 45%; left: 18%; }

    /* dark mode toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 40px;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      font-size: 0.9rem;
      color: var(--text-dark);
    }
    .theme-toggle button {
      background: none;
      border: none;
      color: var(--primary-medium);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      transition: transform 0.2s;
    }
    .theme-toggle button:hover {
      transform: scale(1.2);
    }

    /* main card container */
    .card-wrapper {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      perspective: 1200px;
    }

    /* glass card with tilt, animated gradient border, and layered shadows */
    .glass-card {
      width: 100%;
      max-width: 820px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-radius: 64px;
      padding: 3.5rem 3rem 2rem;
      box-shadow: var(--shadow-card), 
                  0 20px 30px -10px rgba(0, 65, 110, 0.2),
                  0 0 0 1px rgba(255,255,255,0.8) inset;
      border: 2px solid transparent;
      background-clip: padding-box;
      border-image: repeating-linear-gradient(45deg, #9acdff, #c0e1ff, #a5d0ff) 30;
      animation: borderGlow 6s infinite alternate, float 6s infinite ease-in-out;
      text-align: center;
      transition: transform 0.1s ease-out, box-shadow 0.3s;
      transform-style: preserve-3d;
      display: flex;
      flex-direction: column;
    }
    @keyframes borderGlow {
      0% { border-image-source: linear-gradient(45deg, #9acdff, #b0daff, #c8e5ff); }
      50% { border-image-source: linear-gradient(45deg, #b0daff, #c8e5ff, #9acdff); }
      100% { border-image-source: linear-gradient(45deg, #c8e5ff, #9acdff, #b0daff); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* ring around binary logo */
    .logo-ring {
      position: relative;
      width: 148px;
      height: 148px;
      margin: 0 auto var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-ring::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00a6ff, #4d9fff, #a0c8ff, #00a6ff);
      animation: rotateRing 4s linear infinite;
      mask: radial-gradient(circle, transparent 55%, black 56%);
      -webkit-mask: radial-gradient(circle, transparent 55%, black 56%);
      opacity: 0.7;
      filter: blur(2px);
    }
    .logo-ring::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 180deg, var(--accent-warm), #ffdd88, var(--accent-warm));
      animation: rotateRing 6s linear infinite reverse;
      mask: radial-gradient(circle, transparent 60%, black 61%);
      -webkit-mask: radial-gradient(circle, transparent 60%, black 61%);
      opacity: 0.4;
      filter: blur(3px);
    }
    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* binary logo */
    .binary-logo {
      width: 128px;
      height: 128px;
      background: var(--bg-white);
      border-radius: 50%;
      box-shadow: 0 18px 25px -10px rgba(0, 110, 210, 0.25), 0 0 0 2px var(--border-glow) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      position: relative;
    }
    .binary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 80px;
      height: 80px;
    }
    .binary-grid span {
      font-family: 'Courier New', monospace;
      font-weight: 800;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(230, 245, 255, 0.6);
      border-radius: 6px;
      transition: var(--transition-default);
    }
    .binary-grid span:hover {
      transform: scale(1.2);
      background: rgba(210, 235, 255, 0.9);
    }
    .binary-grid span:nth-child(odd) { color: var(--primary-dark); }
    .binary-grid span:nth-child(even) { color: var(--primary-light); }

    /* tagline / value proposition */
    .tagline {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--primary-medium);
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }

    /* company name with glitch on hover and glow */
    .company-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 8vw, 3.2rem);
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, var(--primary-dark), var(--primary-medium));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(30,120,210,0.15);
      transition: var(--transition-default);
    }
    .company-name:hover {
      filter: drop-shadow(0 0 10px var(--primary-light));
    }
    .company-name.glitch {
      animation: glitch 0.3s infinite;
    }
    @keyframes glitch {
      0% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
      25% { transform: skew(2deg, 1deg); opacity: 0.9; }
      50% { transform: skew(-2deg, -1deg); text-shadow: -3px 0 #ff00c1, 3px 0 #00fff9; }
      75% { transform: skew(1deg, 2deg); }
      100% { transform: skew(0deg, 0deg); text-shadow: none; }
    }
    .company-name span {
      font-weight: 300;
      background: linear-gradient(130deg, var(--primary-medium), #4a9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 0.85em;
    }

    /* status badge with glow on hover */
    .status-modern {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(190, 225, 255, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.7);
      padding: 0.75rem 2rem;
      border-radius: 80px;
      margin: var(--spacing-md) 0 var(--spacing-sm);
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--primary-dark);
      box-shadow: 0 6px 14px rgba(0,110,200,0.1);
      align-self: center;
      transition: all 0.3s;
    }
    .status-modern:hover {
      box-shadow: 0 0 20px var(--primary-light);
      transform: scale(1.05);
    }
    .status-modern i { color: var(--primary-medium); font-size: 1.4rem; }

    /* progress area */
    .progress-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 1.4rem auto 1.8rem;
      flex-wrap: wrap;
    }
    .progress-track {
      width: 240px;
      height: 8px;
      background: rgba(70, 140, 210, 0.15);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.5);
      overflow: hidden;
    }
    .progress-fill {
      width: 68%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary-light), #79bcff);
      border-radius: 20px;
      box-shadow: 0 0 10px var(--primary-light);
      transition: width 0.3s;
    }
    .progress-counter {
      font-weight: 700;
      font-size: 1.3rem;
      background: #d7ecff;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: var(--primary-dark);
      transition: var(--transition-default);
      position: relative;
      overflow: hidden;
    }
    .progress-counter:hover {
      transform: scale(1.05);
      background: #c0e2ff;
    }
    .progress-counter::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255,255,255,0.8);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }
    .progress-counter:active::after {
      animation: ripple 1s ease-out;
    }
    @keyframes ripple {
      0% { transform: scale(0, 0); opacity: 0.5; }
      100% { transform: scale(20, 20); opacity: 0; }
    }

    /* micro dots */
    .micro-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 2rem 0 1rem;
    }
    .micro-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: #7bb3e6;
      transform: rotate(45deg);
      opacity: 0.5;
      animation: dotShift 3s infinite;
    }
    .micro-dot:nth-child(2) { animation-delay: 0.4s; background: #5290ce; }
    .micro-dot:nth-child(3) { animation-delay: 0.8s; background: #3275b5; }
    @keyframes dotShift {
      0% { opacity: 0.3; transform: rotate(45deg) scale(1); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.2); background: #6aa9ec; }
    }

    /* contact block (footer) */
    .contact-premium {
      background: linear-gradient(115deg, #d2ebff, #ecf7ff);
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem 1.2rem;
      border: 1px solid white;
      box-shadow: 0 20px 30px -15px rgba(0,100,200,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      margin-top: var(--spacing-lg);
      align-self: center;
      font-size: 0.9rem;
    }
    .contact-premium:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 35px -15px rgba(0,100,200,0.3);
    }
    .contact-premium:focus-within {
      box-shadow: 0 0 0 3px rgba(45,158,255,0.5);
    }
    .contact-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--primary-dark);
      font-size: 1.1rem;
    }
    .contact-label i {
      font-size: 1.2rem;
      color: var(--primary-medium);
    }
    .email-block {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .email-link {
      font-weight: 700;
      font-size: 1.2rem;
      background: linear-gradient(130deg, var(--primary-dark), var(--primary-medium));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .email-link:hover,
    .email-link:focus-visible {
      border-bottom-color: var(--primary-medium);
      outline: none;
    }
    .copy-icon {
      background: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-medium);
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0,80,150,0.1);
      border: 1px solid rgba(255,255,255,0.9);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .copy-icon:hover,
    .copy-icon:focus-visible {
      transform: scale(1.1);
      box-shadow: 0 8px 18px rgba(0,120,210,0.2);
      outline: none;
    }
    .copy-icon::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0);
      transition: all 0.4s;
    }
    .copy-icon:active::after {
      opacity: 1;
      transform: scale(2);
      transition: 0s;
    }

    /* flash card (permanent after 10s) */
    .flash-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.8rem 3rem;
      border-radius: 50px;
      box-shadow: 0 30px 50px rgba(0,100,200,0.3), 0 0 0 2px #a0d0ff inset;
      z-index: 10000;
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 700;
      color: var(--primary-dark);
      border: 1px solid white;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .flash-card.show {
      opacity: 1;
    }

    /* shimmer effect on main text */
    .shimmer-text {
      display: inline-block;
      background: linear-gradient(90deg, 
        var(--primary-dark) 0%, 
        #ffffff 40%, 
        #ffffff 60%, 
        var(--primary-dark) 100%);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }

    /* blinking gems */
    .blink-gem {
      animation: blink 1s step-end infinite;
      color: var(--primary-light);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* footer inside flash card - centered */
    .flash-footer {
      margin-top: 1rem;
      padding-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.9;
      font-weight: 400;
      letter-spacing: 1px;
      color: var(--primary-medium);
      border-top: 1px solid rgba(45, 158, 255, 0.3);
      width: 100%;
      text-align: center;
    }

    /* countdown timer inside flash card - enhanced background */
    .countdown-timer {
      margin-top: 1rem;
      font-size: 2rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: linear-gradient(135deg, rgba(45, 158, 255, 0.15), rgba(255, 255, 255, 0.5));
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 20px rgba(0, 100, 200, 0.2), inset 0 0 10px rgba(255,255,255,0.5);
      width: auto;
    }
    .timer-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary-medium);
      margin-bottom: 0.3rem;
      font-weight: 600;
    }

    /* ---------- BLUR BACKGROUND EFFECT ---------- */
    body.blur-background > *:not(.flash-card):not(.custom-cursor) {
      filter: blur(4px);
      transition: filter 0.3s ease;
    }

    /* noise texture overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMjUiIC8+PC9zdmc+');
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f0f8ff;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary-light);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-medium);
    }

    /* reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .logo-ring::before,
      .logo-ring::after,
      .progress-fill,
      .micro-dot,
      .shimmer-text,
      .blink-gem {
        animation: none !important;
      }
      .shimmer-text {
        background: none;
        color: var(--primary-dark);
      }
    }

    /* focus outline for keyboard */
    :focus-visible {
      outline: 3px solid var(--primary-light);
      outline-offset: 4px;
    }

    /* responsive */
    @media (max-width: 550px) {
      .glass-card { padding: 2.5rem 1.5rem 1.8rem; }
      .company-name { font-size: 2.4rem; }
      .logo-ring { width: 120px; height: 120px; }
      .binary-logo { width: 100px; height: 100px; }
      .binary-grid { width: 70px; height: 70px; gap: 4px; }
      .binary-grid span { font-size: 1rem; }
      .contact-premium { flex-direction: column; gap: 0.6rem; padding: 0.7rem 1.2rem; }
      .email-link { font-size: 1.1rem; }
      .custom-cursor { width: 30px; height: 30px; font-size: 18px; }
      .flash-card { font-size: 1.2rem; padding: 1.2rem 1.5rem; white-space: normal; }
      .flash-footer { font-size: 0.9rem; }
      .countdown-timer { font-size: 1.5rem; }
      .theme-toggle { top: 10px; right: 10px; }
    }

    /* loading spinner */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border: 4px solid rgba(45,158,255,0.1);
      border-top: 4px solid var(--primary-light);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 10001;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .loading-spinner.show {
      opacity: 1;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- loading spinner -->
  <div class="loading-spinner" id="loadingSpinner"></div>

  <!-- animated gradient background -->
  <div class="gradient-bg"></div>

  <!-- dark mode toggle -->
  <div class="theme-toggle" aria-label="Theme switcher">
    <span>🌞/🌜</span>
    <button id="darkModeToggle" aria-label="Toggle dark mode">🌓</button>
  </div>

  <!-- custom cursor (binary digit) -->
  <div class="custom-cursor" id="customCursor">0</div>

  <!-- binary rain canvas with fallback -->
  <canvas id="binary-canvas"></canvas>
  <div class="canvas-fallback"></div>

  <!-- floating tech icons -->
  <div class="parallax-icons">
    <div class="parallax-icon icon1" aria-hidden="true"><i class="fa-solid fa-microchip"></i></div>
    <div class="parallax-icon icon2" aria-hidden="true"><i class="fa-solid fa-code"></i></div>
    <div class="parallax-icon icon3" aria-hidden="true"><i class="fa-solid fa-cloud"></i></div>
    <div class="parallax-icon icon4" aria-hidden="true"><i class="fa-solid fa-brackets-curly"></i></div>
    <div class="parallax-icon icon5" aria-hidden="true"><i class="fa-solid fa-gear"></i></div>
  </div>

  <!-- flash card (hidden initially) - with shimmer text, blinking gems, footer and countdown container -->
  <div class="flash-card" id="flashCard" aria-live="polite">
    <i class="fa-regular fa-gem blink-gem"></i> 
    <span class="shimmer-text">Fine Tuning the Sculpture just for You!!!</span> 
    <i class="fa-regular fa-gem blink-gem"></i>
    <br><span class="shimmer-text">www.bitbytetech.org</span></br>
	<i class="fa-regular fa-gem blink-gem"></i>
    <!-- countdown timer will be inserted here after 25 seconds -->
    <div id="countdownContainer" style="min-height: 60px;"></div>
  </div>

  <div class="card-wrapper" id="cardWrapper">
    <div class="glass-card" id="glassCard">
      <!-- logo ring -->
      <div class="logo-ring">
        <div class="binary-logo">
          <div class="binary-grid">
            <span>0</span><span>1</span><span>0</span>
            <span>1</span><span>0</span><span>1</span>
            <span>0</span><span>1</span><span>0</span>
          </div>
        </div>
      </div>

      <!-- tagline -->
      <div class="tagline">Innovative solutions for tomorrow's challenges.</div>

      <h1 class="company-name" id="companyName">
        BitByte <span>Technologies</span>
      </h1>

      <!-- status badge -->
      <div class="status-modern">
        <i class="fa-regular fa-clock" aria-hidden="true"></i> We are cooking something Better for you!!! <i class="fa-solid fa-wrench" aria-hidden="true"></i>
      </div>

      <!-- progress with counter -->
      <div class="progress-area">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:68%"></div>
        </div>
        <span class="progress-counter" id="progressCounter">68%</span>
      </div>

      <!-- micro dots -->
      <div class="micro-dots" aria-hidden="true">
        <span class="micro-dot"></span><span class="micro-dot"></span><span class="micro-dot"></span>
      </div>

      <!-- contact block (footer) -->
      <div class="contact-premium" id="contactBlock">
        <span class="contact-label"><i class="fa-regular fa-envelope" aria-hidden="true"></i> Mail us</span>
        <div class="email-block">
          <a href="mailto:reachus@bitbytetech.org" class="email-link" aria-label="Send email to reachus@bitbytetech.org">reachus@bitbytetech.org</a>
          <span class="copy-icon" id="copyIcon" tabindex="0" role="button" aria-label="Copy email address" title="Copy to clipboard">
            <i class="fa-regular fa-copy"></i>
          </span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script>
    (function() {
      // ---------- LOADING SPINNER ----------
      const spinner = document.getElementById('loadingSpinner');
      spinner.classList.add('show');
      setTimeout(() => {
        spinner.classList.remove('show');
      }, 1000);

      // ---------- DARK MODE TOGGLE ----------
      const toggleBtn = document.getElementById('darkModeToggle');
      toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
      });

      // ---------- CUSTOM CURSOR (only on hover devices) ----------
      const cursor = document.getElementById('customCursor');
      if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
        cursor.style.display = 'flex';
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mousedown', () => { cursor.textContent = '1'; });
        document.addEventListener('mouseup', () => { cursor.textContent = '0'; });
        setInterval(() => {
          cursor.textContent = Math.random() > 0.5 ? '0' : '1';
        }, 800);
      }

      // ---------- BINARY RAIN CANVAS with mouse interaction ----------
      const canvas = document.getElementById('binary-canvas');
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        document.body.classList.add('no-canvas');
      } else {
        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
        });

        function initCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          const cols = Math.floor(width / 25);
          particles = [];
          for (let i = 0; i < cols; i++) {
            particles.push({
              x: i * 25 + 10,
              y: Math.random() * height,
              speed: 0.5 + Math.random() * 1,
              char: Math.random() > 0.5 ? '0' : '1'
            });
          }
        }

        let lastFrame = 0;
        function drawBinaryRain(now) {
          if (!ctx) return;
          if (now - lastFrame > 100) {
            ctx.clearRect(0, 0, width, height);
            ctx.font = '16px "Courier New", monospace';
            ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#4da6ff' : '#2d9eff';
            ctx.globalAlpha = 0.25;

            for (let p of particles) {
              // mouse repulsion effect
              const dx = mouseX - p.x;
              const dy = mouseY - p.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 100) {
                const angle = Math.atan2(dy, dx);
                p.x -= Math.cos(angle) * 2;
                p.y -= Math.sin(angle) * 2;
              }

              ctx.fillText(p.char, p.x, p.y);
              p.y += p.speed;
              if (p.y > height) {
                p.y = -20;
                p.char = Math.random() > 0.5 ? '0' : '1';
              }
            }
            lastFrame = now;
          }
          requestAnimationFrame(drawBinaryRain);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        requestAnimationFrame(drawBinaryRain);
      }

      // ---------- TILT EFFECT (only if not reduced motion) ----------
      const card = document.getElementById('glassCard');
      const wrapper = document.getElementById('cardWrapper');
      const motionMedia = window.matchMedia('(prefers-reduced-motion: reduce)');
      if (!motionMedia.matches) {
        wrapper.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (y - centerY) / 20;
          const rotateY = (centerX - x) / 20;
          card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        wrapper.addEventListener('mouseleave', () => {
          card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
      }

      // ---------- GLITCH ON COMPANY NAME HOVER ----------
      const nameEl = document.getElementById('companyName');
      nameEl.addEventListener('mouseenter', () => {
        nameEl.classList.add('glitch');
      });
      nameEl.addEventListener('mouseleave', () => {
        nameEl.classList.remove('glitch');
      });

      // ---------- PROGRESS COUNTER (cycles) with ripple ----------
      const progressFill = document.getElementById('progressFill');
      const counterSpan = document.getElementById('progressCounter');
      let percent = 68;
      setInterval(() => {
        percent += Math.random() * 6 - 2;
        if (percent > 95) percent = 60;
        if (percent < 40) percent = 70;
        const intPercent = Math.round(percent);
        progressFill.style.width = intPercent + '%';
        counterSpan.textContent = intPercent + '%';
        // trigger ripple effect
        counterSpan.style.animation = 'none';
        counterSpan.offsetHeight;
        counterSpan.style.animation = 'ripple 1s';
      }, 2800);

      // ---------- MAGNETIC EFFECT ON CONTACT BLOCK ----------
      const contactBlock = document.getElementById('contactBlock');
      document.addEventListener('mousemove', (e) => {
        const rect = contactBlock.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const distX = e.clientX - centerX;
        const distY = e.clientY - centerY;
        const distance = Math.sqrt(distX * distX + distY * distY);
        if (distance < 150 && !motionMedia.matches) {
          const moveX = distX * 0.1;
          const moveY = distY * 0.1;
          contactBlock.style.transform = `translate(${moveX}px, ${moveY}px)`;
        } else {
          contactBlock.style.transform = 'translate(0, 0)';
        }
      });

      // ---------- PARALLAX ICONS ----------
      const icons = document.querySelectorAll('.parallax-icon');
      document.addEventListener('mousemove', (e) => {
        if (motionMedia.matches) return;
        const mouseX = e.clientX / window.innerWidth - 0.5;
        const mouseY = e.clientY / window.innerHeight - 0.5;
        icons.forEach((icon, index) => {
          const depth = 0.02 * (index + 1);
          const moveX = mouseX * 200 * depth;
          const moveY = mouseY * 200 * depth;
          icon.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
      });

      // ---------- COPY ICON (simulated copy) ----------
      const copyIcon = document.getElementById('copyIcon');
      copyIcon.addEventListener('click', () => {
        alert('✨ reachus@bitbytetech.org (demo — copy simulation)');
      });
      copyIcon.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          alert('✨ reachus@bitbytetech.org (demo — copy simulation)');
        }
      });

      // ---------- FLASH CARD AFTER 10 SECONDS (PERMANENT) WITH BLUR ----------
      const flashCard = document.getElementById('flashCard');
      setTimeout(() => {
        flashCard.classList.add('show');
        document.body.classList.add('blur-background');
      }, 10000);

      // ---------- COUNTDOWN TIMER FOR 15-03-2026 (appears after 25 seconds) ----------
      const countdownContainer = document.getElementById('countdownContainer');
      const targetDate = new Date('2026-03-15T00:00:00');

      function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;
        if (diff <= 0) {
          countdownContainer.innerHTML = '<div class="countdown-timer">🎉 Launch day!</div>';
          // trigger confetti on launch day
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          return;
        }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / (3600000));
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        countdownContainer.innerHTML = `
          <div class="timer-label"><br>COUNTDOWN TO LAUNCH</br></div>
          <div class="countdown-timer">${days}d ${hours}h ${minutes}m ${seconds}s</div>
        `;
      }

      setTimeout(() => {
        updateCountdown();
        setInterval(updateCountdown, 1000);
      }, 25000);

      // ---------- FALLBACK FOR TOUCH DEVICES ----------
      if (!window.matchMedia('(hover: hover)').matches) {
        if (cursor) cursor.style.display = 'none';
        setInterval(() => {
          contactBlock.style.transform = 'none';
        }, 100);
      }

      // ---------- HIGH CONTRAST MODE TOGGLE (keyboard shortcut) ----------
      document.addEventListener('keydown', (e) => {
        if (e.altKey && e.key === 'h') {
          document.body.classList.toggle('high-contrast');
        }
      });
    })();
  </script>
</body>
</html>
